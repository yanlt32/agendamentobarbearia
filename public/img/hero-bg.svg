<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="28%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2a2620"/>
      <stop offset="45%" stop-color="#171512"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <pattern id="pinstripe" width="40" height="40" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="transparent"/>
      <rect width="2" height="40" fill="#d4af37" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#pinstripe)"/>
  <rect width="1600" height="900" fill="url(#goldFade)"/>

  <!-- decorative barber icons, large + faint, right side -->
  <g opacity="0.07" fill="none" stroke="#d4af37" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- open scissors -->
    <g transform="translate(1080,120) rotate(18)">
      <circle cx="0" cy="0" r="42"/>
      <circle cx="0" cy="150" r="42"/>
      <path d="M28,-24 L280,-220"/>
      <path d="M28,174 L280,380"/>
    </g>
    <!-- straight razor -->
    <g transform="translate(1300,480) rotate(-24)">
      <path d="M0,0 L340,0 L400,40 L340,80 L0,80 Z"/>
      <path d="M0,10 L-160,50 L-160,30 Z"/>
    </g>
    <!-- comb -->
    <g transform="translate(1160,700) rotate(8)">
      <rect x="0" y="0" width="280" height="46" rx="6"/>
      <path d="M14,46 L14,100 M42,46 L42,110 M70,46 L70,100 M98,46 L98,112 M126,46 L126,98 M154,46 L154,108 M182,46 L182,100 M210,46 L210,112 M238,46 L238,100 M266,46 L266,106"/>
    </g>
  </g>

  <!-- subtle vignette -->
  <rect width="1600" height="900" fill="url(#glow)" opacity="0.0"/>
</svg>
